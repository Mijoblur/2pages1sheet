<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Imposit — alat PDF 2-dalam-1</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --paper:#ECEAE3;--sheet:#FCFBF8;--ink:#18181B;--muted:#6B6A63;
    --hair:#D6D3C9;--red:#D6432B;--redink:#B33620;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,sans-serif;line-height:1.5;
    -webkit-font-smoothing:antialiased;padding:28px 20px 80px;
  }
  .wrap{max-width:780px;margin:0 auto;}

  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px;}
  .eyebrow{
    font-family:"Space Mono",ui-monospace,monospace;font-size:12px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--redink);display:flex;align-items:center;gap:10px;
  }
  .eyebrow .tgt{flex:none;}
  .langtog{display:inline-flex;border:1px solid var(--hair);border-radius:3px;overflow:hidden;background:var(--sheet);flex:none;}
  .langtog button{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.08em;border:none;background:none;color:var(--ink);padding:7px 11px;cursor:pointer;border-right:1px solid var(--hair);}
  .langtog button:last-child{border-right:none;}
  .langtog button[aria-pressed="true"]{background:var(--ink);color:var(--sheet);}

  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(34px,8vw,56px);line-height:1.02;letter-spacing:-.02em;margin:0 0 14px;}
  h1 em{font-style:normal;color:var(--red);}
  .lede{font-size:16px;color:var(--muted);max-width:48ch;margin:0 0 30px;}

  .drop{position:relative;border:1.5px dashed var(--hair);background:var(--sheet);border-radius:4px;padding:34px 22px;text-align:center;cursor:pointer;transition:border-color .18s ease, background .18s ease, transform .18s ease;}
  .drop:hover,.drop:focus-visible{border-color:var(--red);outline:none;}
  .drop.drag{border-color:var(--red);background:#fff;transform:scale(1.005);}
  .drop.loaded{border-style:solid;border-color:var(--hair);text-align:left;cursor:default;}
  .drop .big{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:18px;}
  .drop .small{font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);margin-top:8px;letter-spacing:.02em;}
  .filerow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .fileicon{width:34px;height:44px;flex:none;}
  .filemeta .name{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:16px;word-break:break-all;}
  .filemeta .stat{font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);margin-top:3px;}
  .swap-btn{margin-left:auto;font-family:"Space Mono",monospace;font-size:12px;background:none;border:1px solid var(--hair);color:var(--ink);padding:7px 12px;border-radius:3px;cursor:pointer;letter-spacing:.04em;}
  .swap-btn:hover{border-color:var(--red);color:var(--redink);}

  .pages{margin-top:28px;}
  .pages.hidden{display:none;}
  .pages-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
  .pages-head .lbl{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .pages-head .cnt{font-family:"Space Mono",monospace;font-size:12px;color:var(--ink);}
  .pages-head .mini{margin-left:auto;display:inline-flex;border:1px solid var(--hair);border-radius:3px;overflow:hidden;background:var(--sheet);}
  .pages-head .mini button{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.06em;border:none;background:none;color:var(--ink);padding:7px 12px;cursor:pointer;border-right:1px solid var(--hair);}
  .pages-head .mini button:last-child{border-right:none;}
  .pages-head .mini button:hover{background:#fff;color:var(--redink);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:11px;}
  .thumb{position:relative;cursor:pointer;border:1px solid var(--hair);border-radius:3px;background:#fff;overflow:hidden;transition:border-color .15s ease, opacity .15s ease;}
  .thumb canvas,.thumb .ph{display:block;width:100%;}
  .thumb .ph{aspect-ratio:0.72;background:repeating-linear-gradient(45deg,#f3f1ea,#f3f1ea 6px,#ece9e0 6px,#ece9e0 12px);}
  .thumb:hover{border-color:var(--red);}
  .thumb .num{position:absolute;top:4px;left:4px;font-family:"Space Mono",monospace;font-size:10px;font-weight:700;background:var(--ink);color:#fff;padding:1px 5px;border-radius:2px;}
  .thumb .x{position:absolute;top:4px;right:4px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;background:var(--red);color:#fff;border-radius:2px;font-family:"Space Mono",monospace;}
  .thumb.excluded{opacity:.42;}
  .thumb.excluded .x{background:var(--ink);}
  .thumb.excluded::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(to top left, transparent 47%, var(--red) 47%, var(--red) 53%, transparent 53%);}

  .panel{margin-top:30px;display:grid;grid-template-columns:1fr 280px;gap:28px;align-items:start;}
  @media(max-width:640px){.panel{grid-template-columns:1fr;}}
  .field{margin-bottom:22px;}
  .field > label{display:block;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
  .seg{display:inline-flex;border:1px solid var(--hair);border-radius:3px;overflow:hidden;background:var(--sheet);flex-wrap:wrap;}
  .seg button{font-family:"Inter",sans-serif;font-size:14px;font-weight:500;border:none;background:none;color:var(--ink);padding:9px 15px;cursor:pointer;border-right:1px solid var(--hair);transition:background .15s,color .15s;}
  .seg button:last-child{border-right:none;}
  .seg button[aria-pressed="true"]{background:var(--ink);color:var(--sheet);}
  .seg button:not([aria-pressed="true"]):hover{background:#fff;color:var(--redink);}

  .preview{background:var(--sheet);border:1px solid var(--hair);border-radius:4px;padding:20px 18px 14px;}
  .preview .ptitle{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
  .preview svg{width:100%;height:auto;display:block;}
  .pcap{font-family:"Space Mono",monospace;font-size:11px;color:var(--muted);margin-top:12px;text-align:center;}

  .go{margin-top:14px;width:100%;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:17px;background:var(--red);color:#fff;border:none;border-radius:4px;padding:16px;cursor:pointer;letter-spacing:.01em;transition:background .16s ease, transform .08s ease;}
  .go:hover:not(:disabled){background:var(--redink);}
  .go:active:not(:disabled){transform:translateY(1px);}
  .go:disabled{background:var(--hair);color:#fff;cursor:not-allowed;}

  .result{margin-top:22px;border:1px solid var(--hair);border-left:3px solid var(--red);background:var(--sheet);border-radius:4px;padding:20px 22px;display:none;}
  .result.show{display:block;animation:rise .3s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .result .rstat{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:20px;margin-bottom:4px;}
  .result .rsub{font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);margin-bottom:16px;}
  .dl{display:inline-flex;align-items:center;gap:9px;text-decoration:none;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px;background:var(--ink);color:var(--sheet);padding:12px 18px;border-radius:3px;}
  .dl:hover{background:#000;}
  .err{color:var(--redink);font-family:"Space Mono",monospace;font-size:13px;margin-top:14px;}

  .autosave{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:18px;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.04em;color:var(--muted);cursor:pointer;user-select:none;}
  .autosave input{appearance:none;-webkit-appearance:none;margin:0;width:38px;height:22px;border-radius:11px;background:var(--hair);position:relative;cursor:pointer;transition:background .16s ease;flex:none;outline:none;}
  .autosave input:checked{background:var(--red);}
  .autosave input::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .16s ease;}
  .autosave input:checked::after{transform:translateX(16px);}
  .autosave input:focus-visible{box-shadow:0 0 0 3px rgba(214,67,43,.3);}
  .saved{font-family:"Space Mono",monospace;font-size:12px;color:var(--redink);margin-top:14px;display:flex;align-items:center;gap:7px;}
  .saved.hidden{display:none;}

  .hidden{display:none;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="eyebrow">
      <svg class="tgt" width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="3.2" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="7" y1="0" x2="7" y2="4" stroke="currentColor" stroke-width="1.2"/><line x1="7" y1="10" x2="7" y2="14" stroke="currentColor" stroke-width="1.2"/><line x1="0" y1="7" x2="4" y2="7" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.2"/></svg>
      <span data-i18n="eyebrow"></span>
    </div>
    <div class="langtog" id="langtog">
      <button data-lang="ms" aria-pressed="true">BM</button>
      <button data-lang="en" aria-pressed="false">EN</button>
    </div>
  </div>

  <h1 data-i18n-html="title"></h1>
  <p class="lede" data-i18n="lede"></p>

  <div class="drop" id="drop" tabindex="0" role="button">
    <div id="dropEmpty">
      <div class="big" data-i18n="dropBig"></div>
      <div class="small" data-i18n="dropSmall"></div>
    </div>
    <div id="dropLoaded" class="hidden">
      <div class="filerow">
        <svg class="fileicon" viewBox="0 0 34 44"><rect x="1" y="1" width="32" height="42" rx="2" fill="#fff" stroke="#D6D3C9"/><path d="M23 1v9h9" fill="none" stroke="#D6D3C9"/><text x="17" y="32" text-anchor="middle" font-family="Space Mono, monospace" font-size="8" fill="#D6432B" font-weight="700">PDF</text></svg>
        <div class="filemeta">
          <div class="name" id="fName">document.pdf</div>
          <div class="stat" id="fStat"></div>
        </div>
        <button class="swap-btn" id="swapBtn" type="button" data-i18n="change"></button>
      </div>
    </div>
    <input type="file" id="fileInput" accept="application/pdf,.pdf" style="display:none" />
  </div>

  <div class="pages hidden" id="pages">
    <div class="pages-head">
      <span class="lbl" data-i18n="pagesLbl"></span>
      <span class="cnt" id="pCount">—</span>
      <span class="mini">
        <button id="selAll" type="button" data-i18n="all"></button>
        <button id="selNone" type="button" data-i18n="none"></button>
      </span>
    </div>
    <div class="grid" id="pgGrid"></div>
  </div>

  <div class="panel">
    <div>
      <div class="field">
        <label data-i18n="layoutLbl"></label>
        <div class="seg" id="segLayout">
          <button data-v="side" aria-pressed="true" data-i18n="side"></button>
          <button data-v="stack" aria-pressed="false" data-i18n="stack"></button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="sizeLbl"></label>
        <div class="seg" id="segSize">
          <button data-v="auto" aria-pressed="true" data-i18n="matchSrc"></button>
          <button data-v="a4" aria-pressed="false">A4</button>
          <button data-v="letter" aria-pressed="false">Letter</button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="spacingLbl"></label>
        <div class="seg" id="segGap">
          <button data-v="0" aria-pressed="true" data-i18n="spNone"></button>
          <button data-v="1" aria-pressed="false" data-i18n="thin"></button>
          <button data-v="2" aria-pressed="false" data-i18n="medium"></button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="firstLbl"></label>
        <div class="seg" id="segFirst">
          <button data-v="0" aria-pressed="true" data-i18n="paired"></button>
          <button data-v="1" aria-pressed="false" data-i18n="cover"></button>
        </div>
      </div>
    </div>

    <div class="preview">
      <div class="ptitle" data-i18n="outSheet"></div>
      <svg id="previewSvg" viewBox="0 0 240 200" aria-hidden="true"></svg>
      <div class="pcap" id="previewCap"></div>
    </div>
  </div>

  <label class="autosave">
    <span data-i18n="autoLbl"></span>
    <input type="checkbox" id="autoChk" checked />
  </label>
  <button class="go" id="goBtn" disabled></button>

  <div class="result" id="result">
    <div class="rstat" id="rStat"></div>
    <div class="rsub" id="rSub"></div>
    <a class="dl" id="dlLink" download>
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v9M4 7l4 4 4-4M2 14h12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="dlText"></span>
    </a>
    <div class="saved hidden" id="savedNote"></div>
    <div class="err hidden" id="errBox"></div>
  </div>

</div>

<script>
const { PDFDocument } = PDFLib;
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

// ---------- i18n ----------
const STR = {
  eyebrow:{ms:"Susun Atur PDF · berfungsi dalam pelayar anda", en:"PDF Imposition · runs in your browser"},
  title:{ms:"Dua halaman,<br><em>satu helaian.</em>", en:"Two pages,<br><em>one sheet.</em>"},
  lede:{ms:"Letakkan fail PDF dan susun dua halaman pada setiap helaian — untuk edaran, cetakan dua muka, dan menjimatkan kertas. Tiada apa-apa keluar dari halaman ini.", en:"Drop in a PDF and lay two pages onto every sheet — for handouts, double-sided printing, and saving paper. Nothing leaves this page."},
  dropBig:{ms:"Letakkan PDF di sini", en:"Drop a PDF here"},
  dropSmall:{ms:"atau ketik untuk pilih fail", en:"or tap to choose a file"},
  change:{ms:"Tukar", en:"Change"},
  pagesLbl:{ms:"Halaman", en:"Pages"},
  all:{ms:"Semua", en:"All"},
  none:{ms:"Tiada", en:"None"},
  layoutLbl:{ms:"Susun atur", en:"Layout"},
  side:{ms:"Sebelah-menyebelah", en:"Side by side"},
  stack:{ms:"Bertindan", en:"Stacked"},
  sizeLbl:{ms:"Saiz helaian", en:"Sheet size"},
  matchSrc:{ms:"Ikut sumber", en:"Match source"},
  spacingLbl:{ms:"Ruang", en:"Spacing"},
  spNone:{ms:"Tiada", en:"None"},
  thin:{ms:"Nipis", en:"Thin"},
  medium:{ms:"Sederhana", en:"Medium"},
  firstLbl:{ms:"Halaman pertama", en:"First page"},
  paired:{ms:"Berpasangan", en:"Paired"},
  cover:{ms:"Kulit penuh", en:"Full cover"},
  autoLbl:{ms:"Muat turun automatik", en:"Auto-download"},
  outSheet:{ms:"Helaian hasil", en:"Output sheet"},
  dlText:{ms:"Muat turun PDF 2-dalam-1", en:"Download 2-up PDF"},
};
const T = {
  ms:{
    statFmt:(p,w,h,s,sh)=>`${p} halaman · ${w}×${h} pt · ${s} → ${sh} helaian`,
    keptFmt:(s,p)=>`${s} daripada ${p} disimpan`,
    layoutWord:l=>l==="side"?"sebelah-menyebelah":"bertindan",
    sizeWord:s=>s==="auto"?"ikut sumber":s.toUpperCase(),
    srcSize:"saiz sumber",
    coverWord:"kulit penuh",
    savedNote:"Disimpan ke fail anda",
    resultFmt:(p,sh)=>`${p} halaman → ${sh} helaian`,
    go:{add:"Tambah PDF untuk mula", gen:"Jana PDF 2-dalam-1", work:"Sedang memproses…", noneSel:"Simpan sekurang-kurangnya satu halaman"},
    errNotPdf:"Itu bukan fail PDF. Pilih fail .pdf.",
    errOpen:"Tidak dapat membuka PDF itu. Mungkin rosak atau dilindungi kata laluan.",
    errBuild:"Tidak dapat menjananya.",
    hmm:"Hmm.",
  },
  en:{
    statFmt:(p,w,h,s,sh)=>`${p} pages · ${w}×${h} pt · ${s} → ${sh} sheets`,
    keptFmt:(s,p)=>`${s} of ${p} kept`,
    layoutWord:l=>l==="side"?"side by side":"stacked",
    sizeWord:s=>s==="auto"?"match source":s.toUpperCase(),
    srcSize:"source size",
    coverWord:"full cover",
    savedNote:"Saved to your files",
    resultFmt:(p,sh)=>`${p} pages → ${sh} sheets`,
    go:{add:"Add a PDF to start", gen:"Generate 2-up PDF", work:"Working…", noneSel:"Keep at least one page"},
    errNotPdf:"That isn't a PDF. Choose a .pdf file.",
    errOpen:"Couldn't open that PDF. It may be corrupted or password-protected.",
    errBuild:"Couldn't build that one.",
    hmm:"Hmm.",
  }
};

const state = {
  bytes:null, name:null, pageCount:0, srcW:595, srcH:842,
  layout:"side", size:"auto", gap:0, cover:0, selected:[], renderId:0,
  lang:"ms", lastResult:null, autoSave:true, lastUrl:null,
};
const A4=[595.28,841.89], LETTER=[612,792], GAP_PT=[0,14,28];

// elements
const drop=document.getElementById("drop"), fileInput=document.getElementById("fileInput");
const dropEmpty=document.getElementById("dropEmpty"), dropLoaded=document.getElementById("dropLoaded");
const fName=document.getElementById("fName"), fStat=document.getElementById("fStat");
const swapBtn=document.getElementById("swapBtn"), goBtn=document.getElementById("goBtn");
const result=document.getElementById("result"), rStat=document.getElementById("rStat");
const rSub=document.getElementById("rSub"), dlLink=document.getElementById("dlLink");
const errBox=document.getElementById("errBox"), previewCap=document.getElementById("previewCap");
const tt=()=>T[state.lang];

// ---------- language ----------
function applyLang(){
  document.documentElement.lang = state.lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = STR[el.dataset.i18n][state.lang]; });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{ el.innerHTML = STR[el.dataset.i18nHtml][state.lang]; });
  if(state.bytes){ updateCounts(); } else { goBtn.textContent = tt().go.add; }
  drawPreview();
  if(state.lastResult) renderResult();
}
document.getElementById("langtog").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.lang=b.dataset.lang;
  [...e.currentTarget.children].forEach(x=>x.setAttribute("aria-pressed", x===b?"true":"false"));
  applyLang();
});

// ---------- segmented controls ----------
function wireSeg(id,key){
  const seg=document.getElementById(id);
  seg.addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b) return;
    [...seg.children].forEach(x=>x.setAttribute("aria-pressed", x===b?"true":"false"));
    const v=b.dataset.v;
    state[key]=(v==="0"||v==="1"||v==="2")?Number(v):v;
    drawPreview();
  });
}
wireSeg("segLayout","layout"); wireSeg("segSize","size"); wireSeg("segGap","gap"); wireSeg("segFirst","cover");

// ---------- file handling ----------
drop.addEventListener("click",()=>{ if(!drop.classList.contains("loaded")) fileInput.click(); });
drop.addEventListener("keydown",e=>{ if((e.key==="Enter"||e.key===" ")&&!drop.classList.contains("loaded")){e.preventDefault();fileInput.click();}});
swapBtn.addEventListener("click",e=>{ e.stopPropagation(); fileInput.click(); });
fileInput.addEventListener("change",e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("drag");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("drag");}));
drop.addEventListener("drop",e=>{ const f=e.dataTransfer.files[0]; if(f) loadFile(f); });

async function loadFile(file){
  hideError(); result.classList.remove("show"); state.lastResult=null;
  if(file.type!=="application/pdf" && !file.name.toLowerCase().endsWith(".pdf")){ showLoadError(tt().errNotPdf); return; }
  try{
    const buf=await file.arrayBuffer();
    const doc=await PDFDocument.load(buf,{ignoreEncryption:true});
    const first=doc.getPage(0);
    state.bytes=buf; state.name=file.name.replace(/\.pdf$/i,"");
    state.pageCount=doc.getPageCount();
    state.srcW=first.getWidth(); state.srcH=first.getHeight();
    dropEmpty.classList.add("hidden"); dropLoaded.classList.remove("hidden"); drop.classList.add("loaded");
    fName.textContent=file.name;
    buildSelector(); renderThumbs(); drawPreview();
  }catch(err){ showLoadError(tt().errOpen); }
}
function showLoadError(msg){
  dropEmpty.classList.remove("hidden"); dropLoaded.classList.add("hidden");
  drop.classList.remove("loaded"); goBtn.disabled=true; goBtn.textContent=tt().go.add;
  document.getElementById("pages").classList.add("hidden"); state.bytes=null;
  result.classList.add("show"); rStat.textContent=tt().hmm; rSub.textContent=""; showError(msg);
}

// ---------- page selector ----------
function getSelected(){ return state.selected.map((v,i)=>v?i:-1).filter(i=>i>=0); }
function buildSelector(){
  state.selected=new Array(state.pageCount).fill(true);
  const grid=document.getElementById("pgGrid"); grid.innerHTML="";
  for(let i=0;i<state.pageCount;i++){
    const tile=document.createElement("div");
    tile.className="thumb"; tile.dataset.i=i;
    tile.innerHTML=`<div class="ph"></div><span class="num">${i+1}</span><span class="x">×</span>`;
    tile.addEventListener("click",()=>toggle(i,tile));
    grid.appendChild(tile);
  }
  document.getElementById("pages").classList.remove("hidden");
  updateCounts();
}
function toggle(i,tile){
  state.selected[i]=!state.selected[i];
  tile.classList.toggle("excluded",!state.selected[i]);
  tile.querySelector(".x").textContent=state.selected[i]?"×":"↺";
  updateCounts();
}
function setAll(v){
  state.selected=state.selected.map(()=>v);
  document.querySelectorAll(".thumb").forEach(t=>{
    t.classList.toggle("excluded",!v);
    t.querySelector(".x").textContent=v?"×":"↺";
  });
  updateCounts();
}
document.getElementById("selAll").addEventListener("click",()=>setAll(true));
document.getElementById("selNone").addEventListener("click",()=>setAll(false));
document.getElementById("autoChk").addEventListener("change",e=>{ state.autoSave=e.target.checked; });

function updateCounts(){
  const sel=getSelected();
  const pairCount=state.cover?Math.max(sel.length-1,0):sel.length;
  const sheets=(state.cover&&sel.length>0?1:0)+Math.ceil(pairCount/2);
  document.getElementById("pCount").textContent=tt().keptFmt(sel.length,state.pageCount);
  fStat.textContent=tt().statFmt(state.pageCount,Math.round(state.srcW),Math.round(state.srcH),sel.length,sheets);
  goBtn.disabled=sel.length===0;
  goBtn.textContent=sel.length===0?tt().go.noneSel:tt().go.gen;
}

async function renderThumbs(){
  state.renderId+=1; const myId=state.renderId;
  try{
    const pdf=await pdfjsLib.getDocument({data:state.bytes.slice(0)}).promise;
    const tiles=document.querySelectorAll(".thumb");
    for(let i=1;i<=pdf.numPages;i++){
      if(state.renderId!==myId) return;
      const page=await pdf.getPage(i);
      const vp0=page.getViewport({scale:1});
      const vp=page.getViewport({scale:170/vp0.width});
      const canvas=document.createElement("canvas");
      canvas.width=vp.width; canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
      const tile=tiles[i-1]; if(tile){ const ph=tile.querySelector(".ph"); if(ph) ph.replaceWith(canvas); }
    }
  }catch(e){/* thumbnails optional */}
}

// ---------- preview diagram ----------
function drawPreview(){
  const svg=document.getElementById("previewSvg");
  const pageAR=state.srcH>0?state.srcW/state.srcH:0.707;
  const sb=state.layout==="side";
  const sheetAR=sb?(pageAR*2):(pageAR/2);
  const slot=(sx,sy,sw,sh,label)=>`<rect x="${sx}" y="${sy}" width="${sw}" height="${sh}" fill="#fff" stroke="#D6D3C9" stroke-width="1"/><text x="${sx+sw/2}" y="${sy+sh/2+5}" text-anchor="middle" font-family="Space Mono, monospace" font-size="${label.length>1?12:15}" fill="#D6432B" font-weight="700">${label}</text>`;
  const cross=(cx,cy)=>`<g stroke="#D6432B" stroke-width="1"><line x1="${cx-4}" y1="${cy}" x2="${cx+4}" y2="${cy}"/><line x1="${cx}" y1="${cy-4}" x2="${cx}" y2="${cy+4}"/></g>`;
  const fit=(maxW,maxH,ar)=>{ let w=maxW,h=w/ar; if(h>maxH){h=maxH;w=h*ar;} return [w,h]; };
  const sheet=(x,y,w,h,inner)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#FCFBF8" stroke="#18181B" stroke-width="1.4"/>`+inner+cross(x,y)+cross(x+w,y)+cross(x,y+h)+cross(x+w,y+h);
  const mGap=state.gap===0?2:(state.gap===1?5:9);

  function twoUp(x,y,w,h,l1,l2){
    const iX=x+mGap,iY=y+mGap,iW=w-2*mGap,iH=h-2*mGap;
    let s;
    if(sb){ const g=mGap,sw=(iW-g)/2; s=slot(iX,iY,sw,iH,l1)+slot(iX+sw+g,iY,sw,iH,l2); }
    else{ const g=mGap,sh=(iH-g)/2; s=slot(iX,iY,iW,sh,l1)+slot(iX,iY+sh+g,iW,sh,l2); }
    return sheet(x,y,w,h,s);
  }

  let out="";
  if(state.cover){
    // cover (single, full page) on the left, the 2-up interior sheet on the right
    const gap=14, leftW=72, rightW=240-32-gap-leftW, maxH=200-2*22;
    const [cw,ch]=fit(leftW,maxH,pageAR);
    const [tw,th]=fit(rightW,maxH,sheetAR);
    const cx=16, cy=(200-ch)/2;
    const tx=16+leftW+gap, ty=(200-th)/2;
    out += sheet(cx,cy,cw,ch, slot(cx+mGap,cy+mGap,cw-2*mGap,ch-2*mGap,"1"));
    out += twoUp(tx,ty,tw,th,"2","3");
  }else{
    const [w,h]=fit(240-44,200-44,sheetAR);
    out = twoUp((240-w)/2,(200-h)/2,w,h,"1","2");
  }
  svg.innerHTML=out;
  previewCap.textContent=`${tt().layoutWord(state.layout)} · ${tt().sizeWord(state.size)}`+(state.cover?` · ${tt().coverWord}`:"");
}

// ---------- generate ----------
goBtn.addEventListener("click",generate);
function sheetDims(pw,ph){
  const sb=state.layout==="side";
  if(state.size==="auto"){ const m=GAP_PT[state.gap]; return sb?[pw*2+m*3,ph+m*2]:[pw+m*2,ph*2+m*3]; }
  const base=state.size==="a4"?A4:LETTER;
  return sb?[base[1],base[0]]:[base[0],base[1]];
}
function coverDims(pw,ph,m){
  if(state.size==="auto") return [pw+m*2, ph+m*2];
  const base=state.size==="a4"?A4:LETTER;
  return pw>ph ? [base[1],base[0]] : [base[0],base[1]]; // orient to the page
}
async function generate(){
  if(!state.bytes) return;
  hideError(); goBtn.disabled=true; goBtn.textContent=tt().go.work;
  result.classList.remove("show"); await new Promise(r=>setTimeout(r,30));
  try{
    const src=await PDFDocument.load(state.bytes,{ignoreEncryption:true});
    const out=await PDFDocument.create();
    const sel=getSelected();
    const m=state.size==="auto"?GAP_PT[state.gap]:(state.gap===0?0:(state.gap===1?14:28));

    const order=sel.slice();
    const coverIdx=(state.cover && order.length>0)?order.shift():null;
    const allIdx=(coverIdx!==null?[coverIdx]:[]).concat(order);
    const embedded=await out.embedPdf(src,allIdx);

    let ei=0;
    if(coverIdx!==null){
      const c=embedded[ei++];
      const [SW,SH]=coverDims(c.width,c.height,m);
      const page=out.addPage([SW,SH]);
      placePage(page,c,[m,m,SW-2*m,SH-2*m]); // single page, centered, full size
    }
    const rest=embedded.slice(ei);
    for(let i=0;i<rest.length;i+=2){
      const a=rest[i], b=rest[i+1]||null;
      const pw=Math.max(a.width,b?b.width:0), ph=Math.max(a.height,b?b.height:0);
      const [SW,SH]=sheetDims(pw,ph);
      const page=out.addPage([SW,SH]);
      let slots;
      if(state.layout==="side"){ const sw=(SW-m*3)/2,sh=SH-m*2; slots=[[m,m,sw,sh],[m*2+sw,m,sw,sh]]; }
      else{ const sw=SW-m*2,sh=(SH-m*3)/2; slots=[[m,m*2+sh,sw,sh],[m,m,sw,sh]]; }
      placePage(page,a,slots[0]); if(b) placePage(page,b,slots[1]);
    }

    const sheets=(coverIdx!==null?1:0)+Math.ceil(rest.length/2);
    const bytes=await out.save();
    if(state.lastUrl) URL.revokeObjectURL(state.lastUrl);
    const url=URL.createObjectURL(new Blob([bytes],{type:"application/pdf"}));
    state.lastUrl=url;
    dlLink.href=url; dlLink.download=`${state.name}-2up.pdf`;
    state.lastResult={n:sel.length,sheets,layout:state.layout,size:state.size,cover:coverIdx!==null,saved:state.autoSave};
    renderResult(); result.classList.add("show");
    if(state.autoSave) triggerSave();
  }catch(err){
    state.lastResult=null; result.classList.add("show");
    rStat.textContent=tt().errBuild; rSub.textContent=""; showError(String(err&&err.message||err));
  }finally{ goBtn.disabled=false; goBtn.textContent=tt().go.gen; }
}
function triggerSave(){
  // Programmatically start the download. A fresh anchor avoids any focus side-effects.
  const a=document.createElement("a");
  a.href=dlLink.href; a.download=dlLink.download;
  document.body.appendChild(a); a.click(); a.remove();
}
function renderResult(){
  const r=state.lastResult; if(!r) return;
  rStat.textContent=tt().resultFmt(r.n,r.sheets);
  const sizeTxt=r.size==="auto"?tt().srcSize:tt().sizeWord(r.size);
  rSub.textContent=`${tt().layoutWord(r.layout)} · ${sizeTxt}`+(r.cover?` · ${tt().coverWord}`:"");
  const note=document.getElementById("savedNote");
  if(r.saved){ note.textContent=`✓ ${tt().savedNote}`; note.classList.remove("hidden"); }
  else{ note.classList.add("hidden"); }
}
function placePage(page,emb,slot){
  const [sx,sy,sw,sh]=slot;
  const scale=Math.min(sw/emb.width,sh/emb.height);
  const w=emb.width*scale,h=emb.height*scale;
  page.drawPage(emb,{x:sx+(sw-w)/2,y:sy+(sh-h)/2,xScale:scale,yScale:scale});
}
function showError(msg){ errBox.textContent=msg; errBox.classList.remove("hidden"); }
function hideError(){ errBox.classList.add("hidden"); errBox.textContent=""; }

// init
applyLang();
drawPreview();
</script>
